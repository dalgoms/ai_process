name: Telegram Notification

on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["GPT Codex Agent"]
    types: [completed]

jobs:
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send push notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"

          TEXT="[PUSH] ${REPO}
          Branch: ${BRANCH}
          Commit: ${COMMIT_MSG}
          Author: ${AUTHOR}
          SHA: ${SHA:0:7}
          Run: ${RUN_URL}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}"

  notify-workflow:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    steps:
      - name: Send workflow result notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          COMMIT_MSG="${{ github.event.workflow_run.display_title }}"

          if [ "$CONCLUSION" = "success" ]; then
            STATUS="SUCCESS"
          elif [ "$CONCLUSION" = "failure" ]; then
            STATUS="FAILED"
          else
            STATUS=$(echo "$CONCLUSION" | tr '[:lower:]' '[:upper:]')
          fi

          TEXT="[${STATUS}] ${WORKFLOW}
          Repo: ${REPO}
          Branch: ${BRANCH}
          Trigger: ${COMMIT_MSG}
          SHA: ${SHA:0:7}
          Run: ${RUN_URL}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}"
