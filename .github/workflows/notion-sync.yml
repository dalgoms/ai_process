name: Notion to GitHub Issue Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout config
        uses: actions/checkout@v5

      - name: Query Notion and create issues
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NOTION_DB_ID: "7f471e8dcba44e878b96cfae8d0de083"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "NOTION_TOKEN not set, skipping"
            exit 0
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT not set — cannot create cross-repo issues"
            exit 1
          fi

          PROJECTS=$(cat config/projects.json)

          RESPONSE=$(curl -s "https://api.notion.com/v1/databases/${NOTION_DB_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{
              "filter": {
                "property": "Processed",
                "checkbox": {
                  "equals": false
                }
              }
            }')

          ERROR=$(echo "$RESPONSE" | jq -r '.object // ""')
          if [ "$ERROR" = "error" ]; then
            MSG=$(echo "$RESPONSE" | jq -r '.message // "Unknown error"')
            echo "::error::Notion API error: $MSG"
            exit 1
          fi

          PAGES=$(echo "$RESPONSE" | jq -r '.results // [] | length')
          echo "Found ${PAGES} unprocessed tasks"

          if [ "$PAGES" = "0" ]; then
            echo "No new tasks"
            exit 0
          fi

          echo "$RESPONSE" | jq -c '.results[]' | while read -r page; do
            TITLE=$(echo "$page" | jq -r '.properties.Title.title[0].plain_text // "Untitled"')
            PROJECT=$(echo "$page" | jq -r '.properties.Project.select.name // "other"')
            TASK_TYPE=$(echo "$page" | jq -r '.properties["Task Type"].select.name // "dev-task"')
            PRIORITY=$(echo "$page" | jq -r '.properties.Priority.select.name // "medium"')
            GOAL=$(echo "$page" | jq -r '.properties.Goal.rich_text[0].plain_text // ""')
            TARGET_FILES=$(echo "$page" | jq -r '.properties["Target Files"].rich_text[0].plain_text // ""')
            APPROVAL=$(echo "$page" | jq -r '.properties["Approval Required"].checkbox // false')
            PAGE_ID=$(echo "$page" | jq -r '.id')
            PAGE_URL=$(echo "$page" | jq -r '.url')

            TARGET_REPO=$(echo "$PROJECTS" | jq -r --arg proj "$PROJECT" '.[$proj].repo // ""')

            if [ -z "$TARGET_REPO" ] || [ "$TARGET_REPO" = "" ]; then
              echo "::warning::Unknown project '${PROJECT}' — no repo mapping found"

              if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
                TEXT="[SYNC ERROR] Unknown project
          Title: ${TITLE}
          Project: ${PROJECT}
          Action: Add '${PROJECT}' to config/projects.json in ai_process"
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  -d chat_id="${TELEGRAM_CHAT_ID}" \
                  -d text="${TEXT}"
              fi
              continue
            fi

            EXISTING=$(gh issue list --repo "$TARGET_REPO" --search "notion:${PAGE_ID}" --json number --jq 'length')
            if [ "$EXISTING" != "0" ]; then
              echo "Issue already exists for ${TITLE}, skipping"
              continue
            fi

            TARGET_SECTION=""
            if [ -n "$TARGET_FILES" ] && [ "$TARGET_FILES" != "" ]; then
              TARGET_SECTION="
          ### Target Files
          ${TARGET_FILES}"
            fi

            BODY="## Task
          ${TITLE}

          ## Context
          | Field | Value |
          |-------|-------|
          | Project | ${PROJECT} |
          | Type | ${TASK_TYPE} |
          | Priority | ${PRIORITY} |
          | Approval Required | ${APPROVAL} |
          | Notion | ${PAGE_URL} |

          ## Goal
          ${GOAL}
          ${TARGET_SECTION}

          ---
          notion:${PAGE_ID}"

            ISSUE_URL=$(gh issue create \
              --repo "$TARGET_REPO" \
              --title "${TITLE}" \
              --label "ai-task" \
              --body "${BODY}")

            echo "Created issue: ${ISSUE_URL} in ${TARGET_REPO}"

            ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oP '\d+$')
            echo "Triggering Codex for issue #${ISSUE_NUM} in ${TARGET_REPO}"
            gh workflow run "GPT Codex Agent" \
              --repo "$TARGET_REPO" \
              -f issue_number="${ISSUE_NUM}"

            curl -s -X PATCH "https://api.notion.com/v1/pages/${PAGE_ID}" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d '{
                "properties": {
                  "Processed": { "checkbox": true },
                  "PR URL": { "url": "'"${ISSUE_URL}"'" }
                }
              }'

            echo "Marked as processed in Notion"

            if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
              TEXT="[NOTION SYNC] New task
          Title: ${TITLE}
          Project: ${PROJECT}
          Repo: ${TARGET_REPO}
          Priority: ${PRIORITY}
          Issue: ${ISSUE_URL}"

              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                -d text="${TEXT}"
            fi
          done
